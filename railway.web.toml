# Railway config for the Next.js web service (create a second service in Railway dashboard)
# Set Root Directory: / (repo root)
# Settings → Config file: railway.web.toml  (required — root railway.toml is Medusa-only)
# Or run: node scripts/railway-configure-web.mjs

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Build-time + runtime env (set in Railway dashboard):
# NEXT_PUBLIC_SHC_API_BASE=https://<medusa-service>.up.railway.app
# NEXT_PUBLIC_MEDUSA_PUBLISHABLE_KEY=<from bootstrap>
# PORT (injected by Railway automatically)