name: CI

on:
  push:
    branches: [ main, 'integrate/*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo build --filter=!mobile
      - run: pnpm turbo test --filter=!mobile
      - run: pnpm turbo typecheck --filter=!mobile
      - run: pnpm turbo lint --filter=web --filter=medusa --filter=mobile-customer --filter=mobile-cook || true
      - run: npx tsx scripts/seed.ts --validate
      - run: pnpm verify:local

  medusa-real-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: shc
          POSTGRES_PASSWORD: shc_dev
          POSTGRES_DB: shc_medusa
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U shc -d shc_medusa"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://shc:shc_dev@localhost:5432/shc_medusa
      MEDUSA_DISABLE_ADMIN: 'true'
      JWT_SECRET: ci-test-jwt-secret
      COOKIE_SECRET: ci-test-cookie-secret
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @shc/types build && pnpm --filter @shc/business-rules build
      - run: cd apps/medusa && pnpm exec medusa db:migrate
      - run: cd apps/medusa && pnpm exec medusa build
      - name: Start Medusa + bootstrap + seed + verify
        run: |
          cd apps/medusa
          MEDUSA_DISABLE_ADMIN=true pnpm exec medusa start &
          SERVER_PID=$!
          for i in $(seq 1 30); do
            curl -sf http://localhost:9000/health >/dev/null && break
            sleep 2
          done
          cd ../..
          node scripts/bootstrap-medusa.js
          cd apps/medusa && pnpm seed
          cd ../..
          pnpm verify:real-e2e
          kill $SERVER_PID || true

  maestro-e2e:
    runs-on: macos-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/integrate/')
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.1.3
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Install Maestro + validate flows
        run: |
          chmod +x scripts/maestro-validate.sh
          ./scripts/maestro-validate.sh
      - name: Maestro device run (optional)
        if: vars.MAESTRO_RUN_DEVICE == 'true'
        run: |
          export MAESTRO_RUN_DEVICE=true
          pnpm customer:dev &
          pnpm cook:dev &
          sleep 30
          maestro test apps/mobile-customer/e2e/customer-auth.yaml apps/mobile-cook/e2e/cook-auth.yaml