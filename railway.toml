# Railway staging topology — Singapore Home Cooks
# Docs: blueprint/03-railway/03-railway.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/medusa/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required env vars (set in Railway dashboard — never commit):
# DATABASE_URL=${{Postgres.DATABASE_URL}}
# REDIS_URL=${{Redis.REDIS_URL}}
# JWT_SECRET, COOKIE_SECRET (generate random strings)
# MEDUSA_DISABLE_ADMIN=true
# MEDUSA_PUBLIC_URL=https://<service>.up.railway.app
# RAILWAY_PUBLIC_DOMAIN=<service>.up.railway.app
# RAILWAY_RUN_SEED=true (first deploy only)
# WEB_PUBLIC_URL=https://<web-service>.up.railway.app (optional CORS auto-append)
# See RAILWAY_DEPLOY.md for full setup + web service (railway.web.toml)