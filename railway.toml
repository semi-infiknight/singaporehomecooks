# Railway staging topology — Singapore Home Cooks
# Docs: blueprint/03-railway/03-railway.md

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/medusa/Dockerfile"

[deploy]
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Required env vars (set in Railway dashboard — never commit):
# DATABASE_URL, REDIS_URL, JWT_SECRET, COOKIE_SECRET
# STORE_CORS, ADMIN_CORS, AUTH_CORS
# MEDUSA_DISABLE_ADMIN=true (API-first; enable admin later)
# Optional: STRIPE_API_KEY (placeholder until PayU)