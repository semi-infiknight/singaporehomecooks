# Customer app — Trust & Safety onboarding tour
# Run: maestro test apps/mobile-customer/e2e/onboarding.yaml
appId: com.singaporehomecooks.customer
---
- launchApp:
    clearState: true
    clearKeychain: true
- openLink: shc-customer:///(shared)/onboarding
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible: "Trust & Safety"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "trust-browse-cta"
    direction: DOWN
    timeout: 15000
- tapOn:
    id: "trust-browse-cta"
- extendedWaitUntil:
    visible: "Hari Raya"
    timeout: 60000
- assertVisible: "Hari Raya"