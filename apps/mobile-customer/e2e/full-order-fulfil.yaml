# Customer app — full order path (browse → cart → checkout → PayNow)
# Run customer yaml first; cook fulfil in apps/mobile-cook/e2e/full-order-fulfil.yaml
appId: com.singaporehomecooks.customer
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible:
      id: "customer-discover-screen"
    timeout: 120000
- tapOn:
    id: "guest-browse-bar"
- extendedWaitUntil:
    visible:
      id: "auth-submit-btn"
    timeout: 30000
- tapOn:
    id: "auth-submit-btn"
- tapOn:
    text: "OK"
    optional: true
- openLink: shc-customer:///(customer)/product/dish_nasi_lemak_prawn_001
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible: "Nasi Lemak Sambal Prawn"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "add-to-cart-btn"
    direction: DOWN
    timeout: 30000
- tapOn:
    id: "allergen-ack"
- hideKeyboard
- tapOn:
    id: "add-to-cart-btn"
- extendedWaitUntil:
    visible:
      id: "cart-screen"
    timeout: 90000
- tapOn:
    id: "proceed-checkout"
- extendedWaitUntil:
    visible:
      id: "checkout-screen"
    timeout: 30000
- scrollUntilVisible:
    element:
      id: "collection-slot-picker"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "collection-slot-picker"
    optional: true
- tapOn:
    text: ".*Singapore time"
    optional: true
- scrollUntilVisible:
    element:
      id: "allergen-ack"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "allergen-ack"
- scrollUntilVisible:
    element:
      id: "pdpa-consent"
    direction: DOWN
    timeout: 20000
- tapOn:
    id: "pdpa-consent"
- tapOn:
    id: "do-checkout"
- extendedWaitUntil:
    visible:
      id: "paynow-ref-input"
    timeout: 60000
- tapOn:
    id: "paynow-ref-input"
- inputText: "TEST-REF-123"
- hideKeyboard
- tapOn:
    id: "confirm-paynow"
- extendedWaitUntil:
    visible:
      id: "order-tracking-screen"
    timeout: 60000
    optional: true