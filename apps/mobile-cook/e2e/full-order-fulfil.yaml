# Cook app — fulfil latest paid order (run after customer full-order-fulfil.yaml)
appId: com.singaporehomecooks.cook
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Sign in as cook"
    timeout: 90000
- tapOn:
    id: "auth-submit-btn"
- tapOn:
    text: "OK"
    optional: true
- runFlow:
    when:
      visible: "Welcome, home cook"
    commands:
      - tapOn:
          id: "cook-onboarding-finish-btn"
- openLink: shc-cook:///(cook)/orders
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "cook-orders-screen"
    timeout: 90000
- tapOn:
    text: "Accept"
    optional: true
- tapOn:
    text: "Prepare"
    optional: true
- tapOn:
    text: "Ready for Collection"
    optional: true
- tapOn:
    text: "Collected"
    optional: true
- openLink: shc-cook:///(cook)/earnings
- tapOn:
    text: "Open"
    optional: true
- extendedWaitUntil:
    visible:
      id: "cook-earnings-screen"
    timeout: 30000
- assertVisible:
    id: "cook-earnings-screen"