# Cook app — first-run onboarding tour
# Run: maestro test apps/mobile-cook/e2e/cook-onboarding.yaml
appId: com.singaporehomecooks.cook
---
- launchApp:
    clearState: true
    clearKeychain: true
- extendedWaitUntil:
    visible: "Sign in as cook"
    timeout: 90000
- tapOn:
    id: "auth-submit-btn"
- tapOn:
    text: "OK"
    optional: true
- extendedWaitUntil:
    visible: "Welcome, home cook"
    timeout: 30000
- tapOn:
    id: "cook-onboarding-finish-btn"
- extendedWaitUntil:
    visible:
      id: "cook-dashboard"
    timeout: 60000
- assertVisible:
    id: "cook-dashboard"